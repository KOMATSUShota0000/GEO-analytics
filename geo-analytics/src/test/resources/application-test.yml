spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  flyway:
    enabled: false
  datasource:
    api:
      jdbc-url: jdbc:h2:mem:ga_it;DB_CLOSE_DELAY=-1
      username: sa
      password:
    batch:
      jdbc-url: jdbc:h2:mem:ga_it;DB_CLOSE_DELAY=-1
      username: sa
      password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      "[hibernate.format_sql]": false
  main:
    allow-bean-definition-overriding: true

app:
  security:
    rls:
      enabled: false
    max-sessions-per-user: 1
    jwt:
      secret: "9f2e7c4a8b1d6e3f0a5c9b2d7e1f4a8c0b3d6e9f2a5c8b1d4e7f0a3c6b9d2e5f8a1c4b7d0e3f6a9c2b5d8e1f4a7c0b3d6e9f2a5c8b1d4e7f0a3c6b9d2e5f8a1c4b7d0e3f6a9c2b5d8e1f4a7c0b3d6e9f2a5c8"
      access-token-expiration-sec: 900
      refresh-token-expiration-sec: 2592000
      cookie-secure: false
  crawler:
    cache-ttl: 24h
    redis-enabled: false
    redis-host: localhost
    redis-port: 6379
  serpapi:
    api-key: dummy_serp_key
  ai:
    realtime-threshold: 10
    gemini:
      api-key: test-key
      model-name: gemini-2.5-flash
  pdf:
    base-url: "http://127.0.0.1:5173"
    temp-dir: "./target/pdf-temp-test"
    internal-token: test-internal-token
    default-brand-color: "#1976d2"
    default-logo-url: ""
    max-concurrent: 2
  notifications:
    mail-from: noreply@example.com
