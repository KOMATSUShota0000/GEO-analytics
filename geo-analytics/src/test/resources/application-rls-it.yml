spring:
  task:
    scheduling:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-rls-it
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      "[hibernate.format_sql]": false
      "[org.hibernate.envers.audit_table_suffix]": _AUD
      "[org.hibernate.envers.revision_field_name]": rev
      "[org.hibernate.envers.revision_type_field_name]": revtype
  datasource:
    driver-class-name: org.postgresql.Driver
  main:
    allow-bean-definition-overriding: true

app:
  bootstrap:
    enabled: false
  security:
    rls:
      enabled: true
  crawler:
    cache-ttl: 24h
    redis-enabled: false
    redis-host: localhost
    redis-port: 6379
  serpapi:
    api-key: dummy_serp_key
  ai:
    realtime-threshold: 10
    gemini:
      api-key: test-key
      model-name: gemini-2.5-flash
    deepseek:
      api-key: ""
      base-url: "https://api.deepseek.com"
  pdf:
    base-url: "http://127.0.0.1:5173"
    temp-dir: "./target/pdf-temp-test"
    internal-token: test-internal-token
    default-brand-color: "#1976d2"
    default-logo-url: ""
    max-concurrent: 2
  notifications:
    mail-from: noreply@example.com
