spring:
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  tomcat:
    connection-timeout: 180s

app:
  crawler:
    cache-ttl: 24h
    redis-enabled: false
    redis-host: "deca9c28024fb31dae9edc6b29c906570a683248d89135e318c926edeae1f656"
    redis-port: 6379
  ai:
    realtime-threshold: 10
    gemini:
      api-key: "AIzaSyCxNfLnl0dLa2r49kysUeq6yVV2ec_fNU8"
      model-name: "${GEMINI_MODEL_NAME:gemini-2.5-flash}"
    deepseek:
      api-key: "${DEEPSEEK_API_KEY:}"
      base-url: "https://api.deepseek.com"
  serpapi:
    api-key: "deca9c28024fb31dae9edc6b29c906570a683248d89135e318c926edeae1f656"
  pdf:
    base-url: "${APP_PDF_BASE_URL:http://127.0.0.1:5173}"
    temp-dir: "${APP_PDF_TEMP_DIR:./data/pdf-temp}"
    internal-token: "${APP_PDF_INTERNAL_TOKEN:dev-internal-token}"
    default-brand-color: "${APP_PDF_DEFAULT_BRAND_COLOR:#1976d2}"
    default-logo-url: "${APP_PDF_DEFAULT_LOGO_URL:}"
    max-concurrent: "${APP_PDF_MAX_CONCURRENT:2}"
  notifications:
    mail-from: "${APP_NOTIFICATIONS_MAIL_FROM:noreply@example.com}"
