spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geo_analytics}"
    username: "postgres"
    password: "Koma7851"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      "[hibernate.dialect]": "org.hibernate.dialect.PostgreSQLDialect"
      "[hibernate.format_sql]": false
      "[org.hibernate.envers.audit_table_suffix]": _AUD
      "[org.hibernate.envers.revision_field_name]": rev
      "[org.hibernate.envers.revision_type_field_name]": revtype
    show-sql: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  tomcat:
    connection-timeout: 180s

app:
  crawler:
    cache-ttl: 24h
    redis-enabled: false
