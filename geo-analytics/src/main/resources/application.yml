spring:
  profiles:
    default: dev
  datasource:
    api:
      jdbc-url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
      username: "${API_WORKER_USER:api_worker}"
      password: "${API_WORKER_PASSWORD:api_worker_pass}"
      hikari:
        connection-timeout: 10000
        leak-detection-threshold: 30000
        max-lifetime: 300000
        maximum-pool-size: 20
    batch:
      jdbc-url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
      username: "${BATCH_WORKER_USER:batch_worker}"
      password: "${BATCH_WORKER_PASSWORD:batch_worker_pass}"
      hikari:
        connection-timeout: 10000
        leak-detection-threshold: 30000
        max-lifetime: 300000
        maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
    user: "${FLYWAY_USER:postgres}"
    password: "${FLYWAY_PASSWORD:}"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful
  forward-headers-strategy: native
  tomcat:
    connection-timeout: 180s
    remoteip:
      internal-proxies: "10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|100\\.6[4-9]\\.\\d{1,3}\\.\\d{1,3}|100\\.[7-9]\\d\\.\\d{1,3}\\.\\d{1,3}|100\\.1[0-1]\\d\\.\\d{1,3}\\.\\d{1,3}|100\\.12[0-7]\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]\\.\\d{1,3}\\.\\d{1,3}|172\\.2\\d\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]\\.\\d{1,3}\\.\\d{1,3}"

app:
  branding:
    storage-root: "/tmp/geo-analytics/branding"
  distributed-lock:
    impl: postgres
  security:
    max-sessions-per-user: 1
    jwt:
      secret: "${JWT_SECRET:9f2e7c4a8b1d6e3f0a5c9b2d7e1f4a8c0b3d6e9f2a5c8b1d4e7f0a3c6b9d2e5f8a1c4b7d0e3f6a9c2b5d8e1f4a7c0b3d6e9f2a5c8b1d4e7f0a3c6b9d2e5f8a1c4b7d0e3f6a9c2b5d8e1f4a7c0b3d6e9f2a5c8}"
      access-token-expiration-sec: 900
      refresh-token-expiration-sec: 2592000
      cookie-secure: false
  crawler:
    cache-ttl: 24h
    redis-enabled: false
    redis-host: "deca9c28024fb31dae9edc6b29c906570a683248d89135e318c926edeae1f656"
    redis-port: 6379
  ai:
    realtime-threshold: 10
    token-profit-guard:
      reserved-margin-rate: 0.7
      usd-per-million-tokens: 3.50
      chars-per-token-approx: 1.0
      plan-budget-usd:
        STANDARD: 0.02
        PRO: 0.05
        EXPERT: 0.10
    prompt-injection-guard:
      timeout-seconds: 30
      fail-open-on-error: false
    gemini:
      api-key: "AIzaSyCxNfLnl0dLa2r49kysUeq6yVV2ec_fNU8"
      model-name: "${GEMINI_MODEL_NAME:gemini-2.5-flash}"
    deepseek:
      api-key: "${DEEPSEEK_API_KEY:}"
      base-url: "https://api.deepseek.com"
  # AI Overview (GEO) 計測プロバイダ設定（キー名は維持）
  serpapi:
    api-key: "deca9c28024fb31dae9edc6b29c906570a683248d89135e318c926edeae1f656"
  pdf:
    base-url: "${APP_PDF_BASE_URL:http://127.0.0.1:5173}"
    temp-dir: "${APP_PDF_TEMP_DIR:./data/pdf-temp}"
    internal-token: "${APP_PDF_INTERNAL_TOKEN:dev-internal-token}"
    default-brand-color: "${APP_PDF_DEFAULT_BRAND_COLOR:#1976d2}"
    default-logo-url: "${APP_PDF_DEFAULT_LOGO_URL:}"
    max-concurrent: "${APP_PDF_MAX_CONCURRENT:2}"
  rate-limit:
    public-api:
      capacity: 10
      refill-minutes: 1
  notifications:
    mail-from: "${APP_NOTIFICATIONS_MAIL_FROM:noreply@example.com}"