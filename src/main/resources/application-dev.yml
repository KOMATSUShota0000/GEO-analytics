spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    ignore-migration-patterns: "*:missing"
    validate-on-migrate: false
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geo_analytics}"
    user: "${FLYWAY_USER:postgres}"
    password: "${FLYWAY_PASSWORD:}"
  datasource:
    api:
      jdbc-url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geo_analytics}"
      username: "${API_WORKER_USER:api_worker}"
      password: "${API_WORKER_PASSWORD:api_worker_pass}"
    batch:
      jdbc-url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geo_analytics}"
      username: "${BATCH_WORKER_USER:batch_worker}"
      password: "${BATCH_WORKER_PASSWORD:batch_worker_pass}"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": false
    show-sql: false
    open-in-view: false

server:
  address: 127.0.0.1
  port: 8080

logging:
  level:
    com.geo.analytics: DEBUG
    org.springframework.security: DEBUG