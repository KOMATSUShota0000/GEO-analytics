spring:
  profiles:
    default: dev
  datasource:
    api:
      jdbc-url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
      username: "${API_WORKER_USER:api_worker}"
      password: "${API_WORKER_PASSWORD}"
      hikari:
        connection-timeout: 10000
        leak-detection-threshold: 30000
        max-lifetime: 300000
        maximum-pool-size: 20
    batch:
      jdbc-url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
      username: "${BATCH_WORKER_USER:batch_worker}"
      password: "${BATCH_WORKER_PASSWORD}"
      hikari:
        connection-timeout: 10000
        leak-detection-threshold: 30000
        max-lifetime: 300000
        maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: "${DB_URL:jdbc:postgresql://localhost:5432/geo_analytics}"
    user: "${FLYWAY_USER:postgres}"
    password: "${FLYWAY_PASSWORD:}"
    # V129 がワーカーロールのパスワードを env 由来値へ ALTER する際に展開する。
    # 未設定なら起動時にプロパティ解決で失敗させ、弱い値で黙って動かさない。
    placeholders:
      api_worker_password: "${API_WORKER_PASSWORD}"
      batch_worker_password: "${BATCH_WORKER_PASSWORD}"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  lifecycle:
    timeout-per-shutdown-phase: 20s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  shutdown: graceful
  forward-headers-strategy: native
  tomcat:
    connection-timeout: 180s
    remoteip:
      internal-proxies: "10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|100\\.6[4-9]\\.\\d{1,3}\\.\\d{1,3}|100\\.[7-9]\\d\\.\\d{1,3}\\.\\d{1,3}|100\\.1[0-1]\\d\\.\\d{1,3}\\.\\d{1,3}|100\\.12[0-7]\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]\\.\\d{1,3}\\.\\d{1,3}|172\\.2\\d\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]\\.\\d{1,3}\\.\\d{1,3}"

app:
  branding:
    storage-root: "/tmp/geo-analytics/branding"
  security:
    max-sessions-per-user: 1
    jwt:
      secret: "${JWT_SECRET:}"
      access-token-expiration-sec: 900
      refresh-token-expiration-sec: 2592000
      cookie-secure: false
  crawler:
    cache-ttl: 24h
    redis-enabled: false
    redis-host: "${REDIS_HOST:localhost}"
    redis-port: 6379
  ai:
    realtime-threshold: 10
    prompt-injection-guard:
      timeout-seconds: 30
      fail-open-on-error: false
    gemini:
      api-key: "${GEMINI_API_KEY:}"
      model-name: "${GEMINI_MODEL_NAME:gemini-2.5-flash}"
  # AI Overview (GEO) 計測プロバイダ設定（キー名は維持）
  serpapi:
    api-key: "${SERPAPI_API_KEY:}"
  places:
    api-key: "${GOOGLE_PLACES_API_KEY:}"
  pdf:
    temp-dir: "${APP_PDF_TEMP_DIR:./data/pdf-temp}"
  rate-limit:
    public-api:
      capacity: 10
      refill-minutes: 1
  notifications:
    mail-from: "${APP_NOTIFICATIONS_MAIL_FROM:noreply@example.com}"

# Stripe セルフサーブ自動決済（案B）。
# secret-key / webhook-secret は機密 → 必ず環境変数で注入（ハードコード禁止）。
# price-* は機密ではない（テストモードの価格ID）ため既定値を持たせるが、本番は環境変数で上書き可能。
stripe:
  secret-key: "${STRIPE_SECRET_KEY:}"
  webhook-secret: "${STRIPE_WEBHOOK_SECRET:}"
  success-url: "${STRIPE_SUCCESS_URL:http://localhost:5173/?billing=success}"
  cancel-url: "${STRIPE_CANCEL_URL:http://localhost:5173/plans?billing=cancel}"
  prices:
    standard: "${STRIPE_PRICE_STANDARD:price_1TeFu0AC5qg6GAUebc4ELEpv}"
    pro: "${STRIPE_PRICE_PRO:price_1TeFuWAC5qg6GAUebbZdffa0}"
    expert: "${STRIPE_PRICE_EXPERT:price_1TeFuyAC5qg6GAUe6lWtjpuQ}"