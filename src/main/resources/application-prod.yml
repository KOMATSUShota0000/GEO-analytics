spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: "jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:geo_analytics}"
    username: "${DB_USER:postgres}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": false
    show-sql: false
    open-in-view: false

app:
  security:
    max-sessions-per-user: 1
    jwt:
      secret: "${JWT_SECRET}"
      access-token-expiration-sec: 900
      refresh-token-expiration-sec: 2592000
      cookie-secure: true
    rls:
      enabled: true
      postgres-session-parameter: app.current_tenant
      enforce-appi-2026: true
